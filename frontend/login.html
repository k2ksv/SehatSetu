<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sehat Setu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-side auth-side-login">
            <a class="brand brand-light" href="index.html">
                <span class="brand-mark">SS</span>
                <span>
                    <strong>Sehat Setu</strong>
                    <small>Patient and clinic login</small>
                </span>
            </a>
            <div class="auth-copy">
                <p class="eyebrow">Secure access</p>
                <h1>Return to your health workspace.</h1>
                <p>Access reports, appointments, reminders, and communication history from one login.</p>
            </div>
        </section>
        <section class="auth-panel">
            <div class="auth-card">
                <p class="eyebrow">Login</p>
                <h2>Welcome back</h2>
                <form class="auth-form">
                    <label>
                        <span>Email or phone</span>
                        <input type="text" placeholder="name@example.com">
                    </label>
                    <label>
                        <span>Password</span>
                        <input type="password" placeholder="Enter password">
                    </label>
                    <div class="form-row">
                        <label class="checkbox-row">
                            <input type="checkbox">
                            <span>Remember me</span>
                        </label>
                        <a href="register.html">Create account</a>
                    </div>
                    <a class="button" href="dashboard.html">Login to dashboard</a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
