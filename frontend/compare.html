<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Comparison</title>
    <link rel="stylesheet" href="assets/styles.css">
    <style>
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
        }
        .comparison-table th, .comparison-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        .comparison-table th {
            background-color: #f4f4f4;
        }
        .comparison-header {
            text-align: center;
            margin-top: 2rem;
        }
        .filter-section {
            margin: 1rem 0;
            text-align: center;
        }
        .filter-section input, .filter-section select {
            padding: 0.5rem;
            margin: 0 0.5rem;
        }
    </style>
</head>
<body>
    <h1 class="comparison-header">Compare Hospitals</h1>
    <div class="filter-section">
        <input type="text" id="searchName" placeholder="Search by name...">
        <select id="sortBy">
            <option value="">Sort By</option>
            <option value="rating">Rating</option>
            <option value="beds">Beds</option>
            <option value="location">Location</option>
        </select>
        <button onclick="filterHospitals()">Apply</button>
    </div>
    <table class="comparison-table" id="hospitalTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Location</th>
                <th>Beds</th>
                <th>Specialties</th>
                <th>Rating</th>
            </tr>
        </thead>
        <tbody>
            <!-- Hospital rows will be inserted here by JS -->
        </tbody>
    </table>
    <script src="assets/script.js"></script>
    <script>
        // Example hospital data
        const hospitals = [
            { name: "City Hospital", location: "Delhi", beds: 250, specialties: "Cardiology, Neurology", rating: 4.5 },
            { name: "Green Valley Clinic", location: "Mumbai", beds: 120, specialties: "Orthopedics, Pediatrics", rating: 4.2 },
            { name: "Sunrise Medical Center", location: "Bangalore", beds: 300, specialties: "General, Oncology", rating: 4.7 },
            { name: "Riverfront Hospital", location: "Chennai", beds: 180, specialties: "ENT, Dermatology", rating: 4.0 },
            { name: "Metro Health", location: "Kolkata", beds: 200, specialties: "Gynecology, Urology", rating: 4.3 }
        ];

        function renderTable(data) {
            const tbody = document.getElementById('hospitalTable').querySelector('tbody');
            tbody.innerHTML = '';
            data.forEach(hospital => {
                const row = `<tr>
                    <td>${hospital.name}</td>
                    <td>${hospital.location}</td>
                    <td>${hospital.beds}</td>
                    <td>${hospital.specialties}</td>
                    <td>${hospital.rating}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function filterHospitals() {
            let filtered = [...hospitals];
            const searchName = document.getElementById('searchName').value.toLowerCase();
            const sortBy = document.getElementById('sortBy').value;

            if (searchName) {
                filtered = filtered.filter(h => h.name.toLowerCase().includes(searchName));
            }

            if (sortBy) {
                filtered.sort((a, b) => {
                    if (sortBy === 'rating' || sortBy === 'beds') {
                        return b[sortBy] - a[sortBy];
                    } else if (sortBy === 'location') {
                        return a.location.localeCompare(b.location);
                    }
                    return 0;
                });
            }

            renderTable(filtered);
        }

        // Initial render
        renderTable(hospitals);
    </script>
</body>
</html>
